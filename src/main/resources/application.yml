spring:
  application:
    name: plaid-enrich-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Security — API key authentication
# Set ENRICH_API_KEY in the deployment environment. No default is provided here;
# the service will fail to start if this property is absent (prevents unauthenticated deployments).
enrich:
  security:
    api-key: ${ENRICH_API_KEY}
  cache:
    # How many days before a merchant cache entry is considered stale and re-enriched.
    # Set to 0 to disable TTL-based refresh entirely.
    ttl-days: 30

# Plaid API Configuration
plaid:
  api:
    base-url: ${PLAID_API_BASE_URL:http://localhost:8089}
    enrich-endpoint: /enrich/transactions
    timeout:
      connection: 5000
      request: 10000
    api-key: ${PLAID_API_KEY:mock-key}
    client-id: ${PLAID_CLIENT_ID:mock-client-id}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      plaidApi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - java.util.concurrent.TimeoutException

  retry:
    instances:
      plaidApi:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
        ignore-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException.Unauthorized

  bulkhead:
    instances:
      plaidApi:
        max-concurrent-calls: 10
        max-wait-duration: 2s

  thread-pool-bulkhead:
    instances:
      plaidApi:
        max-thread-pool-size: 10
        core-thread-pool-size: 5
        queue-capacity: 50
        keep-alive-duration: 20s

# Management & Actuator
# Base exposure is minimal — only health, info, and metrics are public by default.
# circuitbreakers and circuitbreakerevents are internal state; they are enabled only
# in application-dev.yml to avoid leaking resilience internals in non-dev environments.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# OpenAPI Documentation
# Disabled by default — enable explicitly in application-dev.yml or via ENABLE_SWAGGER=true.
# Leaving Swagger enabled in non-local environments leaks the full API surface area.
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${ENABLE_SWAGGER:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${ENABLE_SWAGGER:false}
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
  shutdown: graceful

# Logging
logging:
  level:
    root: INFO
    com.td.enrich: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
